```yaml
name: Build Firmware

on:
  push:
    branches: ["main"]
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build da imagem do devcontainer
      - name: Build devcontainer image
        run: |
          docker build \
            -t esp-idf-devcontainer \
            -f firmware/fw_bitbox_v1/.devcontainer/Dockerfile \
            firmware/fw_bitbox_v1/.devcontainer

      # 3. Build do firmware dentro do container
      - name: Run build inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/firmware/fw_bitbox_v1:/project \
            -w /project \
            esp-idf-devcontainer \
            idf.py build

      # 4. Preparar arquivos corretos para OTA
      - name: Prepare firmware for release
        run: |
          cp firmware/fw_bitbox_v1/build/fw_bitbox_v1.bin firmware.bin
          cp firmware/fw_bitbox_v1/build/fw_bitbox_v1.elf firmware.elf

      # 5. Upload como artifact (debug)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build
          path: |
            firmware/fw_bitbox_v1/build
            firmware.bin
            firmware.elf

      # 6. Criar release (somente em tag)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            firmware.bin
            firmware.elf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
